<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>麻將計分</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d12;
      --surface:    #1a1a24;
      --surface2:   #24242f;
      --gold:       #c9a84c;
      --gold-light: #e0be6e;
      --gold-dim:   rgba(201,168,76,0.15);
      --red:        #e8193c;
      --red-dim:    rgba(232,25,60,0.15);
      --loss:       #4a9eff;
      --loss-dim:   rgba(74,158,255,0.12);
      --text:       #ffffff;
      --text2:      rgba(255,255,255,0.5);
      --border:     rgba(255,255,255,0.08);
      --radius:     18px;
    }

    body {
      font-family: -apple-system, 'PingFang TC', 'Noto Sans TC', sans-serif;
      background: var(--bg);
      min-height: 100vh; min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      padding-top: env(safe-area-inset-top);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      color: var(--text);
    }

    /* ===== VIEWS ===== */
    .view {
      display: none;
      padding: clamp(14px, 4vw, 22px);
      padding-bottom: max(48px, env(safe-area-inset-bottom));
      min-height: 100vh; min-height: 100dvh;
    }
    .view.active { display: block; }
    @media (min-width: 600px) {
      .view { max-width: 480px; margin: 0 auto; }
    }

    /* ===== SHARED ===== */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .card-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .btn-dice {
      width: 44px; height: 44px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface2);
      font-size: 1.5rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s;
      line-height: 1; color: var(--gold);
    }
    .btn-dice:active { transform: rotate(180deg) scale(0.9); }

    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }

    .view-header {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 2px 20px;
    }
    .btn-back {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .view-header h2 { color: var(--text); font-size: 1.4rem; font-weight: 800; }

    /* ===== BUTTONS ===== */
    .btn-primary {
      width: 100%; padding: 20px;
      font-size: 1.3rem; font-weight: 800;
      color: #1a0e00;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border: none; border-radius: var(--radius); cursor: pointer;
      letter-spacing: 4px;
      box-shadow: 0 4px 24px rgba(201,168,76,0.4);
      transition: transform 0.1s;
    }
    .btn-primary:active { transform: scale(0.98); }

    .btn-record {
      width: 100%; padding: clamp(18px, 4vw, 22px);
      font-size: clamp(1.3rem, 4.5vw, 1.6rem); font-weight: 800;
      color: white;
      background: linear-gradient(135deg, #c41030, var(--red));
      border: none; border-radius: var(--radius); cursor: pointer;
      letter-spacing: 4px;
      box-shadow: 0 4px 24px rgba(232,25,60,0.35);
      transition: transform 0.1s;
    }
    .btn-record:active { transform: scale(0.98); }

    .btn-ghost {
      flex: 1; padding: 16px 10px;
      font-size: 1rem; font-weight: 700;
      color: var(--text2);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; cursor: pointer; letter-spacing: 1px;
      transition: background 0.1s;
    }
    .btn-ghost:active { background: var(--surface2); color: var(--text); }
    .btn-ghost.danger { color: rgba(232,25,60,0.7); }

    .btn-confirm {
      width: 100%; padding: 20px;
      font-size: 1.2rem; font-weight: 800;
      color: #1a0e00;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border: none; border-radius: var(--radius); cursor: pointer;
      letter-spacing: 3px; transition: opacity 0.2s;
    }
    .btn-confirm:disabled { opacity: 0.25; cursor: not-allowed; }

    .btn-cancel {
      width: 100%; padding: 16px;
      font-size: 1rem; color: var(--text2);
      background: none; border: none; cursor: pointer; margin-top: 4px;
    }

    /* ===== SETUP ===== */
    .setup-header {
      text-align: center;
      padding: clamp(24px, 6vw, 40px) 0 clamp(18px, 4vw, 28px);
    }
    .setup-header h1 {
      font-size: clamp(2rem, 8vw, 2.8rem);
      font-weight: 900; color: var(--gold); letter-spacing: 8px;
    }
    .setup-header p { font-size: 0.9rem; color: var(--text2); margin-top: 8px; }

    .player-row {
      display: flex; align-items: center; gap: 14px; margin-bottom: 14px;
    }
    .player-row:last-child { margin-bottom: 0; }
    .dir-label {
      font-size: 2rem; font-weight: 900;
      flex-shrink: 0; width: 36px; text-align: center; line-height: 1;
    }
    .player-row input {
      flex: 1; font-size: 1.3rem; font-weight: 600;
      padding: 14px 16px;
      border: 1.5px solid var(--border); border-radius: 14px;
      outline: none; font-family: inherit;
      color: var(--text); background: var(--surface2);
      transition: border-color 0.2s;
    }
    .player-row input:focus { border-color: var(--gold); }
    .player-row input::placeholder { color: var(--text2); }

    .money-inline { display: flex; align-items: center; gap: 8px; }
    .money-inline input {
      width: 100px; font-size: 1.2rem; font-weight: 700;
      padding: 10px 14px;
      border: 1.5px solid var(--border); border-radius: 12px;
      text-align: center; outline: none; font-family: inherit;
      color: var(--text); background: var(--surface2);
      transition: border-color 0.2s;
    }
    .money-inline input:focus { border-color: var(--gold); }
    .settings-hint { font-size: 0.9rem; color: var(--text2); }

    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0; border-bottom: 1px solid var(--border);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row label { font-size: 1.1rem; font-weight: 600; color: var(--text); }

    .rate-card { border-color: rgba(201,168,76,0.4); background: rgba(201,168,76,0.06); }
    .rate-card .card-title { color: var(--gold); }
    .rate-row {
      display: flex; align-items: center; justify-content: center; gap: 14px;
      margin-top: 14px;
    }
    .rate-input {
      flex: 1; font-size: 2.6rem; font-weight: 900;
      padding: 12px 8px;
      border: 1.5px solid rgba(201,168,76,0.3); border-radius: 14px;
      text-align: center; outline: none; font-family: inherit;
      color: var(--gold); background: var(--surface2); min-width: 0;
    }
    .rate-input:focus { border-color: var(--gold); }
    .rate-slash { font-size: 2.4rem; font-weight: 200; color: var(--text2); flex-shrink: 0; }

    .money-input-row { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
    .money-currency { font-size: 1.1rem; font-weight: 700; color: var(--text2); white-space: nowrap; }
    .money-input {
      flex: 1; font-size: 2rem; font-weight: 800;
      padding: 12px 16px;
      border: 1.5px solid var(--border); border-radius: 14px;
      outline: none; font-family: inherit;
      color: var(--text); background: var(--surface2); text-align: right;
      transition: border-color 0.2s;
    }
    .money-input:focus { border-color: var(--gold); }
    .money-input::placeholder { color: var(--text2); }
    .money-unit { font-size: 1.1rem; font-weight: 700; color: var(--text2); }

    /* ===== GAME ===== */
    .game-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 2px 20px;
    }
    .game-logo { color: var(--gold); font-size: 1.1rem; font-weight: 900; letter-spacing: 3px; }
    .ju-label { color: var(--gold); font-size: 1.2rem; font-weight: 900; letter-spacing: 3px; text-align: right; }
    .round-pill { color: var(--text2); font-size: 0.78rem; font-weight: 500; text-align: right; margin-top: 3px; }

    .scoreboard {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px;
    }
    .score-card {
      background: var(--surface); border-radius: 16px;
      padding: 12px 14px 16px; text-align: center;
      border: 1px solid var(--border);
    }
    .score-card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px; min-height: 24px;
    }
    .dir-badge {
      font-size: clamp(1rem, 3.2vw, 1.2rem); font-weight: 900; color: var(--gold); line-height: 1;
    }
    .banker-badge {
      background: var(--red); color: white;
      font-size: clamp(0.65rem, 1.8vw, 0.72rem); font-weight: 800;
      padding: 3px 8px; border-radius: 20px; letter-spacing: 0.5px; white-space: nowrap;
    }
    .score-card-name {
      font-size: clamp(0.9rem, 2.8vw, 1.05rem); font-weight: 700; color: var(--text2);
      margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .score-card-value {
      font-size: clamp(2rem, 6.5vw, 2.8rem); font-weight: 900; line-height: 1;
    }
    .score-card-net { font-size: clamp(0.8rem, 2.4vw, 0.95rem); font-weight: 600; margin-top: 6px; }

    @media (orientation: landscape) and (max-height: 560px) {
      .scoreboard { grid-template-columns: repeat(4, 1fr); }
      .score-card-value { font-size: clamp(1.4rem, 3.5vw, 1.9rem); }
      .game-topbar { padding: 8px 2px 12px; }
      .game-actions { gap: 8px; }
      .btn-record { padding: 14px; font-size: 1.1rem; }
      .btn-ghost { padding: 10px; font-size: 0.9rem; }
    }
    .net-pos { color: var(--red); }
    .net-neg { color: var(--loss); }
    .net-zero { color: var(--text2); }

    .game-actions { display: flex; flex-direction: column; gap: 10px; }
    .btn-row { display: flex; gap: 10px; }

    /* ===== MODAL ===== */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 200; align-items: flex-end;
    }
    .overlay.active { display: flex; }

    .sheet {
      width: 100%; background: #16161e;
      border-radius: 24px 24px 0 0;
      border-top: 1px solid var(--border);
      padding: 12px clamp(16px, 5vw, 24px) max(48px, env(safe-area-inset-bottom));
      max-height: 92dvh; overflow-y: auto;
    }
    @media (min-width: 600px) {
      .overlay { justify-content: center; align-items: flex-end; }
      .sheet { max-width: 480px; border-radius: 24px; margin-bottom: 24px; }
    }
    .sheet-handle {
      width: 40px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 10px auto 22px;
    }
    .sheet-title {
      font-size: 1.3rem; font-weight: 900; text-align: center;
      color: var(--gold); margin-bottom: 26px; letter-spacing: 3px;
    }

    .select-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px;
    }
    .sel-btn {
      padding: 16px 10px; font-size: 1.1rem; font-weight: 700;
      border: 1.5px solid var(--border); border-radius: 14px;
      background: var(--surface2); cursor: pointer; color: var(--text);
      transition: all 0.12s; text-align: center;
    }
    .sel-btn:active { transform: scale(0.96); }
    .sel-btn.sel-red { border-color: var(--red); background: var(--red-dim); color: var(--red); }
    .sel-btn.sel-blue { border-color: var(--loss); background: var(--loss-dim); color: var(--loss); }
    .sel-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    .tai-row {
      display: flex; align-items: center; justify-content: center; gap: 28px;
      background: var(--surface2); border-radius: 16px; padding: 20px; margin-bottom: 22px;
    }
    .tai-adj {
      width: 58px; height: 58px; border-radius: 50%;
      border: 1.5px solid var(--border); background: var(--surface);
      font-size: 2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text); transition: background 0.1s; line-height: 1;
    }
    .tai-adj:active { background: var(--border); }
    .tai-num {
      font-size: clamp(2.8rem, 10vw, 3.6rem); font-weight: 900; color: var(--gold);
      min-width: 70px; text-align: center; line-height: 1;
    }
    .tai-unit { font-size: 1rem; color: var(--text2); font-weight: 600; }

    .method-row { display: flex; gap: 10px; margin-bottom: 22px; }
    .method-btn {
      flex: 1; padding: 18px; font-size: 1.2rem; font-weight: 800;
      border: 1.5px solid var(--border); border-radius: 14px;
      background: var(--surface2); cursor: pointer; color: var(--text2);
      text-align: center; transition: all 0.12s; letter-spacing: 2px;
    }
    .method-btn.sel-gold {
      border-color: var(--gold); background: var(--gold-dim); color: var(--gold);
    }

    .preview-box {
      background: var(--surface2); border-radius: 14px;
      border: 1px solid var(--border); padding: 16px; margin-bottom: 20px;
    }
    .preview-title {
      font-size: 0.8rem; color: var(--gold); font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
    }
    .preview-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0; font-size: 1.05rem; border-bottom: 1px solid var(--border);
    }
    .preview-row:last-child { border-bottom: none; }
    .preview-name { color: var(--text2); font-weight: 600; }
    .preview-chg { font-weight: 800; }
    .chg-gain { color: var(--red); }
    .chg-lose { color: var(--loss); }
    .chg-none { color: var(--text2); }
    .preview-hint { font-size: 1rem; color: var(--text2); text-align: center; padding: 14px 0; }

    /* ===== HISTORY ===== */
    .history-empty { text-align: center; color: var(--text2); padding: 70px 0; font-size: 1.1rem; }
    .history-item {
      background: var(--surface); border-radius: 16px; border: 1px solid var(--border);
      padding: 18px; margin-bottom: 10px;
    }
    .hist-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .hist-round { font-size: 0.82rem; color: var(--text2); font-weight: 500; }
    .hist-badge { font-size: 0.78rem; font-weight: 800; padding: 4px 12px; border-radius: 20px; }
    .badge-zimo { background: var(--red-dim); color: var(--red); }
    .badge-fang { background: var(--loss-dim); color: var(--loss); }
    .hist-winner { font-size: 1.05rem; font-weight: 800; color: var(--red); margin-bottom: 6px; }
    .hist-meta { font-size: 0.88rem; color: var(--text2); margin-bottom: 12px; }
    .hist-chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .hchip { padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; }
    .hchip-gain { background: var(--red-dim); color: var(--red); }
    .hchip-lose { background: var(--loss-dim); color: var(--loss); }
    .hchip-none { background: var(--surface2); color: var(--text2); }

    /* ===== SETTLEMENT ===== */
    .sett-header { text-align: center; padding: 36px 0 24px; }
    .sett-header h2 { color: var(--gold); font-size: 2rem; font-weight: 900; letter-spacing: 4px; }
    .sett-header p { color: var(--text2); font-size: 0.9rem; margin-top: 8px; }

    .sett-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0; border-bottom: 1px solid var(--border);
    }
    .sett-row:last-child { border-bottom: none; }
    .sett-name { font-size: 1.15rem; font-weight: 700; color: var(--text); }
    .sett-right { text-align: right; }
    .sett-pts { font-size: 1.7rem; font-weight: 900; }
    .sett-pts.pos { color: var(--red); }
    .sett-pts.neg { color: var(--loss); }
    .sett-pts.zero { color: var(--text2); }
    .sett-money-label { font-size: 0.88rem; color: var(--text2); margin-top: 3px; }

    .debt-row {
      padding: 14px 0; border-bottom: 1px solid var(--border);
      font-size: 1.05rem; color: var(--text); line-height: 1.6;
    }
    .debt-row:last-child { border-bottom: none; }
    .debt-amount { font-weight: 900; color: var(--loss); }

    .sett-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .btn-new-game {
      width: 100%; padding: 20px; font-size: 1.3rem; font-weight: 900;
      color: #1a0e00;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border: none; border-radius: var(--radius); cursor: pointer;
      letter-spacing: 3px; box-shadow: 0 4px 24px rgba(201,168,76,0.3);
    }
  </style>
</head>
<body>

<!-- ============ SETUP VIEW ============ -->
<div class="view active" id="v-setup">
  <div class="setup-header">
    <h1>麻將計分</h1>
    <p>設定玩家與金額後開始</p>
  </div>

  <div class="card">
    <div class="card-title-row">
      <span class="card-title">小名</span>
      <button class="btn-dice" onclick="shuffleNames()" title="隨機分配座位">&#9856;</button>
    </div>
    <div class="player-row">
      <span class="dir-label" style="color:#e8a020">東</span>
      <input type="text" id="p0" placeholder="東方玩家" maxlength="6">
    </div>
    <div class="player-row">
      <span class="dir-label" style="color:#2d8a4e">南</span>
      <input type="text" id="p1" placeholder="南方玩家" maxlength="6">
    </div>
    <div class="player-row">
      <span class="dir-label" style="color:#2060c8">西</span>
      <input type="text" id="p2" placeholder="西方玩家" maxlength="6">
    </div>
    <div class="player-row">
      <span class="dir-label" style="color:#c41e3a">北</span>
      <input type="text" id="p3" placeholder="北方玩家" maxlength="6">
    </div>
  </div>

  <div class="card rate-card">
    <div class="card-title">底台 / 每台（元）</div>
    <div class="rate-row">
      <input type="number" id="s-base" value="50" min="0" max="9999" step="10"
             inputmode="numeric" class="rate-input" placeholder="50">
      <span class="rate-slash">/</span>
      <input type="number" id="s-tai" value="20" min="1" max="9999" step="10"
             inputmode="numeric" class="rate-input" placeholder="20">
    </div>
  </div>

  <div class="card">
    <div class="card-title">每人帶入</div>
    <div class="money-input-row">
      <span class="money-currency">玩</span>
      <input type="number" id="s-budget" value="1000" min="0" max="999999" step="100"
             inputmode="numeric" class="money-input" placeholder="1000">
      <span class="money-unit">塊</span>
    </div>
  </div>

  <button class="btn-primary" onclick="startGame()">開始遊戲</button>
</div>

<!-- ============ GAME VIEW ============ -->
<div class="view" id="v-game">
  <div class="game-topbar">
    <span class="game-logo">麻將計分</span>
    <div style="text-align:right">
      <div class="ju-label" id="ju-label">東風東局</div>
      <div class="round-pill" id="round-pill">第 0 局</div>
    </div>
  </div>

  <div class="scoreboard" id="scoreboard"></div>

  <div class="game-actions">
    <button class="btn-record" onclick="openModal()">記錄本局</button>
    <div class="btn-row">
      <button class="btn-ghost" onclick="showHistory()">歷史紀錄</button>
      <button class="btn-ghost" onclick="showSettlement()">結算</button>
    </div>
    <div class="btn-row">
      <button class="btn-ghost danger" onclick="confirmNewGame()">重新開局</button>
    </div>
  </div>
</div>

<!-- ============ ROUND MODAL ============ -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title">記錄本局</div>

    <div class="section-label">誰贏了？</div>
    <div class="select-grid" id="winner-grid"></div>

    <div class="section-label">幾台？</div>
    <div class="tai-row">
      <button class="tai-adj" onclick="changeTai(-1)">−</button>
      <div style="text-align:center">
        <div class="tai-num" id="tai-val">1</div>
        <div class="tai-unit">台</div>
      </div>
      <button class="tai-adj" onclick="changeTai(+1)">+</button>
    </div>

    <div class="section-label">胡法</div>
    <div class="method-row">
      <button class="method-btn" id="m-zimo" onclick="pickMethod('zimo')">自摸</button>
      <button class="method-btn" id="m-fang" onclick="pickMethod('fangchang')">放槍</button>
    </div>

    <div id="shooter-wrap" style="display:none">
      <div class="section-label">誰放槍？</div>
      <div class="select-grid" id="shooter-grid"></div>
    </div>

    <div class="preview-box">
      <div class="preview-title">本局預覽</div>
      <div id="preview"></div>
    </div>

    <button class="btn-confirm" id="btn-confirm" disabled onclick="confirmRound()">確認記錄</button>
    <button class="btn-cancel" onclick="closeModal()">取消</button>
  </div>
</div>

<!-- ============ HISTORY VIEW ============ -->
<div class="view" id="v-history">
  <div class="view-header">
    <button class="btn-back" onclick="showGame()">←</button>
    <h2>歷史紀錄</h2>
  </div>
  <div id="history-list"></div>
</div>

<!-- ============ SETTLEMENT VIEW ============ -->
<div class="view" id="v-settlement">
  <div class="sett-header">
    <h2>最終結算</h2>
    <p id="sett-sub"></p>
  </div>

  <div class="card">
    <div class="card-title">各玩家盈虧</div>
    <div id="sett-scores"></div>
  </div>

  <div class="card" id="sett-money-card" style="display:none">
    <div class="card-title">金額結算</div>
    <div id="sett-debts"></div>
  </div>

  <div class="sett-actions">
    <button class="btn-new-game" onclick="confirmNewGame()">新的一局</button>
    <div class="btn-row" style="margin-top:4px">
      <button class="btn-ghost" onclick="showGame()">繼續遊戲</button>
      <button class="btn-ghost" onclick="exportCSV()">匯出 CSV</button>
    </div>
  </div>
</div>

<script>
// ===== CONSTANTS =====
const COLORS = ['#e8a020','#2d8a4e','#2060c8','#c41e3a'];
const DEFAULTS = ['東方玩家','南方玩家','西方玩家','北方玩家'];
const DIRS = ['東','南','西','北'];

// ===== STATE =====
let G = {
  players: [],       // [{name, score}]
  rounds: [],        // [{roundNum,winner,tai,method,shooter,changes,time,banker}]
  cfg: { baseMoney:50, perTaiMoney:20, budget:1000 },
  modal: { winner:null, tai:1, method:null, shooter:null },
  banker: 0,         // 目前莊家 index（0=東 1=南 2=西 3=北）
  bankerStreak: 0,   // 連莊次數（0 = 第一莊）
  windRound: 0       // 場風（0=東風 1=南風 2=西風 3=北風）
};

// ===== VIEW =====
function show(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function showGame()       { show('v-game');       renderGame(); }
function showHistory()    { show('v-history');    renderHistory(); }
function showSettlement() { show('v-settlement'); renderSettlement(); }

// ===== SETUP =====
function shuffleNames() {
  const ids = ['p0','p1','p2','p3'];
  const vals = ids.map(id => document.getElementById(id).value);
  // Fisher-Yates shuffle
  for (let i = vals.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [vals[i], vals[j]] = [vals[j], vals[i]];
  }
  ids.forEach((id, i) => document.getElementById(id).value = vals[i]);
}

function startGame() {
  const names = [0,1,2,3].map(i => {
    const v = document.getElementById('p'+i).value.trim();
    return v || DEFAULTS[i];
  });
  G.cfg.baseMoney   = Math.max(0, parseInt(document.getElementById('s-base').value)   || 0);
  G.cfg.perTaiMoney = Math.max(1, parseInt(document.getElementById('s-tai').value)    || 1);
  G.cfg.budget      = Math.max(0, parseInt(document.getElementById('s-budget').value) || 0);
  G.players = names.map(name => ({ name, score: 0 }));
  G.rounds       = [];
  G.banker       = 0;
  G.bankerStreak = 0;
  G.windRound    = 0;
  showGame();
}

// ===== GAME RENDER =====
function colorDot(i) {
  return `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${COLORS[i]};margin-right:6px;vertical-align:middle"></span>`;
}

function currentJu() {
  return `${DIRS[G.windRound]}風${DIRS[G.banker]}局`;
}

function renderGame() {
  document.getElementById('ju-label').textContent = currentJu();
  document.getElementById('round-pill').textContent = G.rounds.length === 0 ? '尚未開局' : `已完成 ${G.rounds.length} 局`;
  document.getElementById('scoreboard').innerHTML = G.players.map((p,i) => {
    const isBanker = i === G.banker;
    const bankerLabel = isBanker
      ? (G.bankerStreak > 0 ? `莊×${G.bankerStreak+1}` : '莊')
      : '';
    const valCls = p.score>0?'net-pos':p.score<0?'net-neg':'net-zero';
    const valStr = p.score>0?`+$${p.score}`:p.score<0?`-$${Math.abs(p.score)}`:'$0';
    const remain = G.cfg.budget > 0 ? G.cfg.budget + p.score : null;
    return `
      <div class="score-card">
        <div class="score-card-header">
          <span class="dir-badge">${DIRS[i]}</span>
          ${isBanker ? `<span class="banker-badge">${bankerLabel}</span>` : '<span></span>'}
        </div>
        <div class="score-card-name">${colorDot(i)}${p.name}</div>
        <div class="score-card-value ${valCls}">${valStr}</div>
        <div class="score-card-net ${remain!==null?(remain<G.cfg.budget?'net-neg':remain>G.cfg.budget?'net-pos':'net-zero'):''}">${remain!==null?`剩 $${remain}`:'&nbsp;'}</div>
      </div>`;
  }).join('');
}

// ===== MODAL =====
function openModal() {
  G.modal = { winner:null, tai:1, method:null, shooter:null };
  document.getElementById('sheet-title').textContent = currentJu();
  renderModal();
  document.getElementById('overlay').classList.add('active');
}
function closeModal() {
  document.getElementById('overlay').classList.remove('active');
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function renderModal() {
  const m = G.modal;

  // Winner grid
  document.getElementById('winner-grid').innerHTML = G.players.map((p,i) =>
    `<button class="sel-btn ${m.winner===i?'sel-red':''}" onclick="pickWinner(${i})">
      <span style="font-size:0.75rem;font-weight:900;color:var(--gold);margin-right:4px">${DIRS[i]}</span>${colorDot(i)}${p.name}${i===G.banker?' <span style="background:var(--red);color:white;font-size:0.65rem;padding:1px 5px;border-radius:10px;font-weight:800;vertical-align:middle">莊</span>':''}
    </button>`
  ).join('');

  // Tai
  document.getElementById('tai-val').textContent = m.tai;

  // Method buttons
  document.getElementById('m-zimo').className = 'method-btn' + (m.method==='zimo'?' sel-gold':'');
  document.getElementById('m-fang').className = 'method-btn' + (m.method==='fangchang'?' sel-gold':'');

  // Shooter
  if (m.method === 'fangchang') {
    document.getElementById('shooter-wrap').style.display = 'block';
    document.getElementById('shooter-grid').innerHTML = G.players.map((p,i) => {
      const disabled = m.winner === i ? 'disabled' : '';
      const sel = m.shooter === i ? 'sel-blue' : '';
      return `<button class="sel-btn ${sel}" ${disabled} onclick="pickShooter(${i})">
        <span style="font-size:0.75rem;font-weight:900;color:var(--gold);margin-right:4px">${DIRS[i]}</span>${colorDot(i)}${p.name}${i===G.banker?' <span style="background:var(--red);color:white;font-size:0.65rem;padding:1px 5px;border-radius:10px;font-weight:800;vertical-align:middle">莊</span>':''}
      </button>`;
    }).join('');
  } else {
    document.getElementById('shooter-wrap').style.display = 'none';
  }

  renderPreview();

  const ready = m.winner !== null && m.method !== null &&
    (m.method !== 'fangchang' || m.shooter !== null);
  document.getElementById('btn-confirm').disabled = !ready;
}

function pickWinner(i)  { G.modal.winner=i; if(G.modal.shooter===i) G.modal.shooter=null; renderModal(); }
function pickMethod(m)  { G.modal.method=m; if(m==='zimo') G.modal.shooter=null; renderModal(); }
function pickShooter(i) { G.modal.shooter=i; renderModal(); }
function changeTai(d)   { G.modal.tai=Math.max(1,Math.min(20,G.modal.tai+d)); renderModal(); }

function calcChanges(m) {
  const payment = G.cfg.baseMoney + m.tai * G.cfg.perTaiMoney;
  return G.players.map((_,i) => {
    if (i === m.winner) return m.method==='zimo' ? payment*3 : payment;
    if (m.method === 'zimo') return -payment;
    if (i === m.shooter)    return -payment;
    return 0;
  });
}

function renderPreview() {
  const m = G.modal;
  if (m.winner===null || m.method===null) {
    document.getElementById('preview').innerHTML = '<div class="preview-hint">請選擇贏家和胡法</div>';
    return;
  }
  if (m.method==='fangchang' && m.shooter===null) {
    document.getElementById('preview').innerHTML = '<div class="preview-hint">請選擇放槍者</div>';
    return;
  }
  const chg = calcChanges(m);
  const payment = G.cfg.baseMoney + m.tai * G.cfg.perTaiMoney;
  const payNote = G.cfg.baseMoney > 0
    ? `底台$${G.cfg.baseMoney} + ${m.tai}台×$${G.cfg.perTaiMoney} = $${payment}/份`
    : `${m.tai}台 × $${G.cfg.perTaiMoney} = $${payment}/份`;
  document.getElementById('preview').innerHTML =
    `<div class="preview-title" style="margin-bottom:8px">${payNote}</div>` +
    G.players.map((p,i) => {
      const c = chg[i];
      const cls = c>0?'chg-gain':c<0?'chg-lose':'chg-none';
      const str = c===0 ? '不變' : `${c>0?'+':''}$${c}`;
      return `<div class="preview-row">
        <span class="preview-name">${colorDot(i)}${p.name}</span>
        <span class="preview-chg ${cls}">${str}</span>
      </div>`;
    }).join('');
}

function confirmRound() {
  const m = G.modal;
  if (m.winner===null || m.method===null) return;
  if (m.method==='fangchang' && m.shooter===null) return;

  const chg = calcChanges(m);
  G.players.forEach((p,i) => p.score += chg[i]);

  const now = new Date();
  const prevBanker    = G.banker;
  const prevStreak    = G.bankerStreak;
  const prevWindRound = G.windRound;

  // 莊家輪轉：贏家是莊 → 連莊；否則輪到下一位
  if (m.winner === G.banker) {
    G.bankerStreak++;
  } else {
    const nextBanker = (G.banker + 1) % 4;
    // 北家結束輪到東，場風進一圈
    if (nextBanker === 0 && G.windRound < 3) G.windRound++;
    G.banker = nextBanker;
    G.bankerStreak = 0;
  }

  G.rounds.push({
    roundNum  : G.rounds.length+1,
    ju        : `${DIRS[prevWindRound]}風${DIRS[prevBanker]}局`,
    winner    : m.winner,
    tai       : m.tai,
    method    : m.method,
    shooter   : m.method==='fangchang' ? m.shooter : null,
    changes   : [...chg],
    payment   : G.cfg.baseMoney + m.tai * G.cfg.perTaiMoney,
    time      : now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}),
    banker    : prevBanker,
    streak    : prevStreak
  });

  closeModal();
  renderGame();
}

// ===== HISTORY =====
function renderHistory() {
  const el = document.getElementById('history-list');
  if (!G.rounds.length) {
    el.innerHTML = '<div class="history-empty">尚無紀錄</div>';
    return;
  }
  el.innerHTML = [...G.rounds].reverse().map(r => {
    const wName = G.players[r.winner].name;
    const isZimo = r.method === 'zimo';
    const shooterNote = isZimo ? '' : `（${G.players[r.shooter].name} 放槍）`;
    const bankerName = G.players[r.banker].name;
    const bankerNote = r.streak > 0 ? `${DIRS[r.banker]} ${bankerName} 連莊×${r.streak+1}` : `${DIRS[r.banker]} ${bankerName} 坐莊`;
    const chips = G.players.map((p,i) => {
      const c = r.changes[i];
      const cls = c>0?'hchip-gain':c<0?'hchip-lose':'hchip-none';
      const str = c>0?`+${c}`:c===0?'—':`${c}`;
      return `<span class="hchip ${cls}">${p.name} ${str}</span>`;
    }).join('');
    return `
      <div class="history-item">
        <div class="hist-top">
          <span class="hist-round">${r.ju} · 第 ${r.roundNum} 局 · ${r.time}</span>
          <span class="hist-badge ${isZimo?'badge-zimo':'badge-fang'}">${isZimo?'自摸':'放槍'}</span>
        </div>
        <div class="hist-winner">${colorDot(r.winner)}${wName}${shooterNote}</div>
        <div class="hist-meta">$${r.payment}/份 · ${r.tai}台 · ${bankerNote}</div>
        <div class="hist-chips">${chips}</div>
      </div>`;
  }).join('');
}

// ===== SETTLEMENT =====
function renderSettlement() {
  document.getElementById('sett-sub').textContent = `共 ${G.rounds.length} 局`;

  const sorted = G.players.map((p,i) => ({...p, idx:i, net:p.score}))
    .sort((a,b) => b.net - a.net);

  document.getElementById('sett-scores').innerHTML = sorted.map(p => {
    const cls    = p.net>0?'pos':p.net<0?'neg':'zero';
    const netStr = p.net>0?`+$${p.net}`:p.net<0?`-$${Math.abs(p.net)}`:'$0';
    const remain = G.cfg.budget > 0 ? `剩 $${G.cfg.budget + p.net}` : '';
    return `
      <div class="sett-row">
        <div class="sett-name">${colorDot(p.idx)}${p.name}</div>
        <div class="sett-right">
          <div class="sett-pts ${cls}">${netStr}</div>
          ${remain ? `<div class="sett-money-label">${remain}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  document.getElementById('sett-money-card').style.display = 'block';
  const debts = computeDebts();
  document.getElementById('sett-debts').innerHTML = debts.length
    ? debts.map(d => `<div class="debt-row">${d.from} 付給 ${d.to} <span class="debt-amount">$${d.amount}</span></div>`).join('')
    : '<div style="color:#999;font-size:0.95rem;padding:8px 0">大家打平！</div>';
}

function computeDebts() {
  const bal = G.players.map((p,i) => ({
    name: p.name,
    amt: p.score
  }));
  const neg = bal.filter(b=>b.amt<0).map(b=>({...b})).sort((a,b)=>a.amt-b.amt);
  const pos = bal.filter(b=>b.amt>0).map(b=>({...b})).sort((a,b)=>b.amt-a.amt);
  const debts = [];
  let ni=0, pi=0;
  while (ni<neg.length && pi<pos.length) {
    const pay = Math.min(-neg[ni].amt, pos[pi].amt);
    if (pay > 0) debts.push({ from:neg[ni].name, to:pos[pi].name, amount:pay });
    neg[ni].amt += pay;
    pos[pi].amt -= pay;
    if (neg[ni].amt===0) ni++;
    if (pos[pi].amt===0) pi++;
  }
  return debts;
}

// ===== CSV EXPORT =====
function exportCSV() {
  const esc = s => `"${String(s).replace(/"/g, '""')}"`;
  const rows = [];

  // 每局明細
  rows.push(['每局明細']);
  rows.push(['局數','風局','時間','贏家','台數','胡法','放槍者','每份金額',
    ...G.players.map(p => p.name + ' 盈虧')]);
  G.rounds.forEach(r => {
    rows.push([
      r.roundNum,
      r.ju,
      r.time,
      G.players[r.winner].name,
      r.tai,
      r.method === 'zimo' ? '自摸' : '放槍',
      r.shooter !== null ? G.players[r.shooter].name : '',
      r.payment,
      ...r.changes.map(c => c > 0 ? `+${c}` : c)
    ]);
  });

  rows.push([]);

  // 最終結算
  rows.push(['最終結算']);
  rows.push(['玩家', '淨盈虧', ...(G.cfg.budget > 0 ? ['剩餘'] : [])]);
  G.players.forEach(p => {
    const net = p.score;
    const netStr = net > 0 ? `+${net}` : net;
    rows.push([
      p.name,
      netStr,
      ...(G.cfg.budget > 0 ? [G.cfg.budget + net] : [])
    ]);
  });

  rows.push([]);

  // 轉帳明細
  const debts = computeDebts();
  if (debts.length) {
    rows.push(['轉帳明細']);
    rows.push(['付款人', '收款人', '金額']);
    debts.forEach(d => rows.push([d.from, d.to, d.amount]));
  }

  const csv = rows.map(r => r.map(esc).join(',')).join('\r\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toLocaleDateString('zh-TW').replace(/\//g, '-');
  a.href = url;
  a.download = `麻將計分_${date}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ===== NEW GAME =====
function confirmNewGame() {
  if (G.rounds.length > 0 && !confirm('確定要重新開局嗎？本局記錄將會清除。')) return;
  show('v-setup');
}
</script>
